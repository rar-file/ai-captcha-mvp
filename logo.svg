<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#4285f4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853"/>
      <stop offset="100%" style="stop-color:#188038"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="100" cy="100" r="75" fill="#fff" opacity="0.1"/>
  
  <!-- Shield/checkmark combo -->
  <path d="M100 45 
           L140 60 
           L140 100 
           C140 130 100 155 100 155 
           C100 155 60 130 60 100 
           L60 60 
           Z" 
        fill="#fff"/>
  
  <!-- Checkmark -->
  <path d="M85 95 L95 105 L115 80" 
        stroke="url(#grad2)" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Circuit/AI pattern lines -->
  <circle cx="85" cy="75" r="4" fill="url(#grad1)"/>
  <circle cx="115" cy="75" r="4" fill="url(#grad1)"/>
  <line x1="85" y1="75" x2="100" y2="85" stroke="url(#grad1)" stroke-width="2"/>
  <line x1="115" y1="75" x2="100" y2="85" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Binary/code decorative elements -->
  <text x="45" y="110" font-family="monospace" font-size="8" fill="#fff" opacity="0.5">01</text>
  <text x="145" y="110" font-family="monospace" font-size="8" fill="#fff" opacity="0.5">10</text>
  <text x="95" y="170" font-family="monospace" font-size="8" fill="#fff" opacity="0.5">AI</text>
</svg>
